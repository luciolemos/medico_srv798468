# Exemplo de vhost compartilhado com o app publicado em:
# https://srv798468.hstgr.cloud/natalcloud/
#
# Ajuste este arquivo no servidor novo antes de aplicar.

# Redirecionamento HTTP -> HTTPS
<VirtualHost *:80>
    ServerName srv798468.hstgr.cloud
    ServerAlias www.srv798468.hstgr.cloud
    ServerAdmin luciolemos.j5@gmail.com
    DocumentRoot /var/www/natalcode/public

    Alias /dashboard /var/www/dashboard/public
    Alias /itapiru /var/www/itapiru/public
    Alias /mvc/ /var/www/mvc/public/
    Alias /mvc /var/www/mvc/public/
    Alias /natalcloud/ /var/www/natalcloud/public/
    Alias /natalcloud /var/www/natalcloud/public/

    <Directory /var/www/dashboard/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/itapiru/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/mvc/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/natalcloud/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/(dashboard|itapiru|mvc|natalcloud)$
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI}/ [L,R=301]

    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    SetEnvIf Request_URI "^/dashboard(/|$)" app_dashboard
    SetEnvIf Request_URI "^/itapiru(/|$)" app_itapiru
    SetEnvIf Request_URI "^/mvc(/|$)" app_mvc
    SetEnvIf Request_URI "^/natalcloud(/|$)" app_natalcloud
    SetEnvIf Request_URI "^/(?!dashboard(/|$)|itapiru(/|$)|mvc(/|$)|natalcloud(/|$)).*" app_natalcode

    ErrorLog ${APACHE_LOG_DIR}/srv-hstgr-http-error.log
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-http-dashboard-access.log combined env=app_dashboard
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-http-itapiru-access.log combined env=app_itapiru
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-http-mvc-access.log combined env=app_mvc
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-http-natalcloud-access.log combined env=app_natalcloud
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-http-natalcode-access.log combined env=app_natalcode
</VirtualHost>

# HTTPS com seguranca reforcada
<VirtualHost *:443>
    ServerName srv798468.hstgr.cloud
    ServerAlias www.srv798468.hstgr.cloud
    ServerAdmin luciolemos.j5@gmail.com
    DocumentRoot /var/www/natalcode/public

    Alias /dashboard /var/www/dashboard/public
    Alias /itapiru /var/www/itapiru/public
    Alias /mvc/ /var/www/mvc/public/
    Alias /mvc /var/www/mvc/public/
    Alias /natalcloud/ /var/www/natalcloud/public/
    Alias /natalcloud /var/www/natalcloud/public/

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/srv798468.hstgr.cloud/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/srv798468.hstgr.cloud/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/srv798468.hstgr.cloud/chain.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionTickets off

    RewriteEngine On
    RewriteRule ^/dashboard$ /dashboard/ [R=301,L]
    RewriteRule ^/itapiru$ /itapiru/ [R=301,L]
    RewriteRule ^/mvc$ /mvc/ [R=301,L]
    RewriteRule ^/natalcloud$ /natalcloud/ [R=301,L]

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set X-XSS-Protection "1; mode=block"

    <Directory /var/www/natalcode/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/dashboard/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/itapiru/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/mvc/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/natalcloud/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SetEnvIf Request_URI "^/dashboard(/|$)" app_dashboard
    SetEnvIf Request_URI "^/itapiru(/|$)" app_itapiru
    SetEnvIf Request_URI "^/mvc(/|$)" app_mvc
    SetEnvIf Request_URI "^/natalcloud(/|$)" app_natalcloud
    SetEnvIf Request_URI "^/(?!dashboard(/|$)|itapiru(/|$)|mvc(/|$)|natalcloud(/|$)).*" app_natalcode

    ErrorLog ${APACHE_LOG_DIR}/srv-hstgr-https-error.log
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-https-dashboard-access.log combined env=app_dashboard
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-https-itapiru-access.log combined env=app_itapiru
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-https-mvc-access.log combined env=app_mvc
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-https-natalcloud-access.log combined env=app_natalcloud
    CustomLog ${APACHE_LOG_DIR}/srv-hstgr-https-natalcode-access.log combined env=app_natalcode
</VirtualHost>
